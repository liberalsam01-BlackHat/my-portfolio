<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do List</title>

    <!-- Connect CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Top Heading -->
    <h1>✨ Smart To-Do List</h1>
    <p class="subtitle">Plan your day simply and beautifully</p>

    <!-- Input Area -->
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task">
        <button onclick="addTask()">Add</button>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="box">
            <h2 id="total">0</h2>
            <p>Total</p>
        </div>

        <div class="box">
            <h2 id="done">0</h2>
            <p>Done</p>
        </div>

        <div class="box">
            <h2 id="pending">0</h2>
            <p>Pending</p>
        </div>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>

</div>

<!-- Connect JS File -->
<script src="script.js"></script>

</body>
</html>
